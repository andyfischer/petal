name: Secret scan

# Two guards, run on every push and PR plus a weekly schedule:
#   1. gitleaks — scans the FULL git history for leaked credentials
#      (config: .gitleaks.toml).
#   2. forbidden-terms — fails if any term listed in the FORBIDDEN_TERMS
#      repository secret appears in tracked files. The term itself lives only
#      in the secret, never in the repo, so the thing being guarded against is
#      not spelled out anywhere in source.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Mondays at 12:00 UTC.
    - cron: "0 12 * * 1"
  workflow_dispatch:

jobs:
  gitleaks:
    name: gitleaks (full history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 pulls the entire history so gitleaks can scan every
          # commit, not just the latest one.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          # Scan the whole repo history (detect mode), not just the diff.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"

  forbidden-terms:
    name: Forbidden terms guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan tracked files for forbidden terms
        env:
          # Set this in: repo Settings → Secrets and variables → Actions → New
          # repository secret, named FORBIDDEN_TERMS. Value is a case-insensitive
          # Perl-compatible regex (PCRE). Use alternation for multiple terms and
          # word boundaries to avoid substring false positives, e.g.:
          #     \bfoo\b|\bbar\b
          # (Word boundaries require PCRE, which is why the scan below uses -P.)
          # GitHub masks the secret value in logs, so any match shows the
          # file:line but not the matched term.
          FORBIDDEN_TERMS: ${{ secrets.FORBIDDEN_TERMS }}
        run: |
          if [ -z "$FORBIDDEN_TERMS" ]; then
            echo "FORBIDDEN_TERMS secret is not set — skipping."
            echo "Configure it in repo Settings → Secrets and variables → Actions to enable this guard."
            exit 0
          fi
          # git grep limits the scan to tracked files. Exit 0 from git grep means
          # a match was found (which is a failure for us).
          if git grep -I -n -P -i -e "$FORBIDDEN_TERMS" -- .; then
            echo "::error::Forbidden term found in tracked files (matched text masked above)."
            exit 1
          fi
          echo "No forbidden terms found."
