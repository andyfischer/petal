name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-core:
    name: Rust core (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: cargo-core-${{ runner.os }}-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: cargo-core-${{ runner.os }}-

      - name: Build Rust
        run: cargo build --manifest-path rust/Cargo.toml

      - name: Run Rust tests
        run: cargo test --manifest-path rust/Cargo.toml

  ts-tests:
    name: TypeScript (tsc + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: cargo-core-${{ runner.os }}-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: cargo-core-${{ runner.os }}-

      - name: Build petal binary (used by vitest)
        run: cargo build --manifest-path rust/Cargo.toml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ts/package-lock.json

      - name: Install Node dependencies
        working-directory: ts
        run: npm ci

      - name: Check committed stdlib manifest is current
        run: |
          npm --prefix ts run stdlib:json
          git diff --exit-code docs/stdlib.json \
            || { echo "::error::docs/stdlib.json is stale — run 'npm run stdlib:json' in ts/ and commit the result"; exit 1; }

      - name: Type-check TypeScript
        working-directory: ts
        run: npx tsc --noEmit

      - name: Run Vitest tests
        working-directory: ts
        run: npx vitest run

  rust-subprojects:
    name: Rust subprojects (petal-sdl, petal-fps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install SDL2 system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev

      - name: Cache Cargo registry & build (subprojects)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            integrations/petal-desktop-sdl/target
            sample-apps/petal-fps/target
          key: cargo-subprojects-${{ runner.os }}-${{ hashFiles('integrations/petal-desktop-sdl/Cargo.lock', 'sample-apps/petal-fps/Cargo.lock') }}
          restore-keys: cargo-subprojects-${{ runner.os }}-

      - name: Build petal-sdl
        run: cargo build --manifest-path integrations/petal-desktop-sdl/Cargo.toml

      - name: Build petal-fps
        run: cargo build --manifest-path sample-apps/petal-fps/Cargo.toml

  web-builds:
    name: Web builds (wasm + vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install binaryen (provides wasm-opt)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends binaryen

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - name: Cache Cargo registry & build (wasm)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
            integrations/petal-web-canvas/rust/target
          key: cargo-wasm-${{ runner.os }}-${{ hashFiles('rust/Cargo.lock', 'integrations/petal-web-canvas/rust/Cargo.lock') }}
          restore-keys: cargo-wasm-${{ runner.os }}-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ----- petal-web -----
      - name: petal-web — install deps
        working-directory: integrations/petal-web-html
        run: npm ci --no-audit --no-fund

      - name: petal-web — build wasm
        working-directory: integrations/petal-web-html
        run: bash build-wasm.sh

      - name: petal-web — vite build
        working-directory: integrations/petal-web-html
        run: npx vite build

      # ----- petal-web-canvas + petal-diagram-canvas (npm workspace) -----
      # diagram-canvas is a sample app that consumes the petal-web-canvas
      # integration (its WASM runtime + shared TS) via the npm workspace, so
      # install once at the repo root and build the integration's wasm first.
      - name: workspace — install deps
        run: npm ci --no-audit --no-fund

      - name: petal-web-canvas — build wasm
        run: npm run build:wasm --workspace integrations/petal-web-canvas

      - name: petal-web-canvas — vite build
        run: npm run build --workspace integrations/petal-web-canvas

      - name: petal-diagram-canvas — vite build
        run: npm run build --workspace sample-apps/diagram-canvas
