<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Petal Web</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }
    h1 { margin-bottom: 1rem; font-size: 1.5rem; color: #555; }
    #app {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 1.5rem;
      min-width: 400px;
      max-width: 600px;
      width: 100%;
    }
    /* Petal component styles */
    .dropdown { position: relative; display: inline-block; margin: 0.5rem; }
    .dropdown-button {
      padding: 0.5rem 1rem;
      background: #4a90d9;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .dropdown-button:hover { background: #357abd; }
    .dropdown-menu {
      position: absolute;
      top: 100%;
      left: 0;
      background: white;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      min-width: 150px;
      z-index: 10;
      margin-top: 4px;
    }
    .dropdown-item {
      padding: 0.5rem 1rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .dropdown-item:hover { background: #f0f0f0; }
    .modal-backdrop {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal {
      background: white;
      border-radius: 8px;
      padding: 1.5rem;
      min-width: 300px;
      max-width: 500px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    .modal h2 { margin-bottom: 1rem; font-size: 1.2rem; }
    .modal p { margin-bottom: 1rem; color: #666; }
    .btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      margin-right: 0.5rem;
    }
    .btn-primary { background: #4a90d9; color: white; }
    .btn-primary:hover { background: #357abd; }
    .btn-secondary { background: #e0e0e0; color: #333; }
    .btn-secondary:hover { background: #ccc; }
    #output {
      margin-top: 1rem;
      padding: 0.5rem;
      background: #f9f9f9;
      border: 1px solid #eee;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.85rem;
      white-space: pre-wrap;
      min-height: 2rem;
      max-height: 200px;
      overflow-y: auto;
    }
    #output:empty { display: none; }
  </style>
</head>
<body>
  <h1>Petal Web</h1>
  <div id="app">Loading...</div>
  <div id="output"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
